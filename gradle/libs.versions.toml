[versions]
agp = "8.11.2"
android-compileSdk = "36"
android-minSdk = "24"
android-targetSdk = "36"
androidx-activity = "1.13.0"
androidx-appcompat = "1.7.1"
androidx-core = "1.18.0"
androidx-espresso = "3.7.0"
androidx-lifecycle = "2.10.0"
androidx-testExt = "1.3.0"
compose-multiplatform = "1.10.3"
junit = "4.13.2"
koinCore = "4.2.0"
kotlin = "2.3.20"
kotlinxSerializationJson = "1.10.0"
ktorClientContentNegotiation = "3.4.1"
ktorClientCore = "3.4.1"
ktorClientLogging = "3.4.1"
ktorSerializationKotlinxJson = "3.4.1"
material3 = "1.10.0-alpha05"
ksp = "2.3.5"      # ← fixed, no longer tied to kotlin version
materialIconsExtended = "1.7.3"
navigationCompose = "2.9.2"
lifecycleViewModel = "2.8.2"


[libraries]
ktor-client-darwin = { module = "io.ktor:ktor-client-darwin", version.ref = "ktorClientContentNegotiation" }
lifecycle-viewmodel = { module = "androidx.lifecycle:lifecycle-viewmodel", version.ref = "lifecycleViewModel"}
koin-android = { module = "io.insert-koin:koin-android", version.ref = "koinCore" }
koin-androidx-compose = { module = "io.insert-koin:koin-androidx-compose", version.ref = "koinCore" }
